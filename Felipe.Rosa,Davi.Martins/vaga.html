<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <title>Vagas abertas</title>
    <script src="script/script.js"></script>
</head>
<body>
    <header>
        <div style="display: flex; flex-direction: row;align-items: center;justify-content: center; ">
            <h1 style="margin-top: 10px;">Formulário</h1>
        </div>
    </header>
    <div class="container-fluid mb-5 ms-3">
        
        <form>
            <div class="mb-3 mt-3">
                <label for="exampleInputName1" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" placeholder="Digite o Nome" required>
            </div>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email </label>
                <input placeholder="Email" type="email" class="form-control" id="email" aria-describedby="emailHelp" required>
                <div id="emailHelp" sclass="form-text"></div>
            </div>
            <div class="row">
                <div class="col-4">
                    
                    <div class="mb-3">
                        <label  class="form-label">Qual sua área de interesse?</label>
                        <select class="form-select"  required >
                             <option value="">Selecione</option>
                            <option value="1">Desenvolvimento </option>
                            <option value="2">Design</option>
                            <option value="3">Suporte</option>
                            <option value="4">Comercial</option>
                        </select>
                    </div>
                </div>
                <div class="col-4">
                    <div class="mb-3">
                    <label  class="form-label">Qual seu nível de expeiência?</label>
                    <select class="form-select" >
                        <option selected>Selecione</option>
                        <option value="1">Junior </option>
                        <option value="2">Pleno</option>
                        <option value="3">Sênior</option>
                    </select>
                </div>
                </div>
                
            </div>
            
            <div class="mb-4">
                <label for="formFile" class="form-label"></label>
                <input  class="form-control" type="file" id="formFile" required>
            </div>
            <div class = "mb-3">
                <select class="form-select" aria-label="Default select example" >
                    <option selected>Disponibilidade de Horário</option>
                    <option value="Manha">8:00-12:00</option>
                    <option value="Tarde">13:15-17:15</option>
                    <option value="Noite">18:30-22:30</option>
                </select>
            </div>
            <div class="form-floating mb-3" >
             
                <textarea class="form-control" placeholder="Apresentação" id="floatingTextarea" rows = "3" cols = "50"></textarea>
                <label for="floatingTextarea">Comentários</label>
            </div>
            
            
            <button type="submit" class="btn btn-primary mb-3" >Salvar</button>
        </form>
    </div>
</div>


</body>
</html>
